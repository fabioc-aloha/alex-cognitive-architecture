<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Alex Research Assistance — Approved Research Banner">
  <title>Alex Research Assistance</title>
  <desc>Printer-friendly white banner certifying Alex-approved research artifacts.</desc>

  <!-- Background: white for print friendliness -->
  <rect width="1200" height="300" fill="#ffffff"/>

  <!-- Brand left accent bar -->
  <rect x="0" y="0" width="6" height="300" fill="#6366f1"/>

  <!-- Subtle hairline border for crisp printed edges -->
  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Eyebrow label -->
  <text x="40" y="78" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="16" font-weight="700" fill="#6366f1" letter-spacing="6">
    ALEX COGNITIVE ARCHITECTURE
  </text>

  <!-- Main title -->
  <text x="40" y="155" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="800" fill="#0f172a" letter-spacing="-1">
    Alex Research Assistance
  </text>

  <!-- Subtitle / certification phrase -->
  <text x="40" y="195" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="500" fill="#475569">
    Approved research — sourced, reasoned, and reviewed under Alex's critical-thinking protocol.
  </text>

  <!-- Hairline divider -->
  <line x1="40" y1="225" x2="780" y2="225" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Footer meta line -->
  <text x="40" y="255" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#64748b" letter-spacing="2">
    SEVEN DISCIPLINES · MATERIALITY GATE · NEVER GUESS
  </text>

  <!-- Approval seal (right side) — straight text only -->
  <g transform="translate(1060, 150)">
    <!-- Outer ring -->
    <circle r="92" fill="#ffffff" stroke="#6366f1" stroke-width="3"/>
    <!-- Inner ring -->
    <circle r="78" fill="none" stroke="#6366f1" stroke-width="1"/>

    <!-- Top label -->
    <text x="0" y="-44" font-family="'Segoe UI', system-ui, sans-serif"
          font-size="12" font-weight="800" fill="#6366f1" letter-spacing="3" text-anchor="middle">
      ALEX APPROVED
    </text>

    <!-- Center checkmark -->
    <path d="M -22,0 L -6,18 L 26,-20"
          fill="none" stroke="#22c55e" stroke-width="7"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bottom label -->
    <text x="0" y="50" font-family="'Segoe UI', system-ui, sans-serif"
          font-size="11" font-weight="700" fill="#6366f1" letter-spacing="2" text-anchor="middle">
      RESEARCH
    </text>
    <text x="0" y="68" font-family="'Segoe UI', system-ui, sans-serif"
          font-size="9" font-weight="600" fill="#94a3b8" letter-spacing="1.5" text-anchor="middle">
      ALEX FINCH
    </text>
  </g>
</svg>
