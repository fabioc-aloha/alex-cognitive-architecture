<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Background -->
  <rect x="0" y="0" width="24" height="24" rx="3" fill="currentColor" opacity="0.12"/>
  <!-- Bar -->
  <rect x="0" y="0" width="2" height="24" rx="0" fill="currentColor" opacity="0.5"/>
  <!-- "Alex" -->
  <text x="3" y="15.5"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="11" font-weight="800" fill="currentColor"
        textLength="20" lengthAdjust="spacingAndGlyphs"
        shape-rendering="geometricPrecision">Alex</text>
</svg>
